  <rect class="panel" x="64" y="624" width="1036" height="76" rx="22"/>
  <text class="small" x="92" y="653">High-yield pattern</text>
  <text class="body" x="92" y="682">All three posterior divisions unite into the posterior cord. Lateral and medial cords are named by their relation to the axillary artery.</text>
</svg>
