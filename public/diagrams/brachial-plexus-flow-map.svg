<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Brachial Plexus Flow Map</title>
  <desc id="desc">A redrawn anatomy schematic of roots, trunks, divisions, cords, and terminal branches of the brachial plexus.</desc>
  <defs>
    <style>
      .bg { fill: #f5fbfb; }
      .panel { fill: #ffffff; stroke: #d2e2e5; stroke-width: 2; }
      .node { fill: #ffffff; stroke: #0c6b73; stroke-width: 3; rx: 18; }
      .node-warm { fill: #fff4ef; stroke: #d14f37; stroke-width: 3; rx: 18; }
      .node-gold { fill: #fff8df; stroke: #a37710; stroke-width: 3; rx: 18; }
      .label { font: 700 24px 'Avenir Next', 'Segoe UI', sans-serif; fill: #12344c; }
      .body { font: 600 18px 'Avenir Next', 'Segoe UI', sans-serif; fill: #12344c; }
      .small { font: 600 15px 'Avenir Next', 'Segoe UI', sans-serif; fill: #5c6f78; }
      .line { fill: none; stroke: #0c6b73; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .line-soft { fill: none; stroke: #5c6f78; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .artery { fill: #eef7f8; stroke: #12344c; stroke-width: 3; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#0c6b73"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760" rx="28"/>
  <rect class="panel" x="24" y="24" width="1152" height="712" rx="30"/>

  <text class="label" x="64" y="78">Brachial Plexus Flow Map</text>
  <text class="small" x="64" y="108">Trace structure first. Add lesions later.</text>

  <text class="small" x="92" y="150">Roots</text>
  <text class="small" x="286" y="150">Trunks</text>
  <text class="small" x="476" y="150">Divisions</text>
  <text class="small" x="676" y="150">Cords</text>
  <text class="small" x="930" y="150">Terminal branches</text>

  <rect class="node" x="64" y="172" width="120" height="56"/>
  <rect class="node" x="64" y="258" width="120" height="56"/>
  <rect class="node" x="64" y="344" width="120" height="56"/>
  <rect class="node" x="64" y="430" width="120" height="56"/>
