  <text class="body" x="276" y="370">Middle trunk</text>
  <text class="body" x="278" y="508">Lower trunk</text>

  <rect class="node" x="454" y="176" width="120" height="44"/>
  <rect class="node" x="454" y="240" width="120" height="44"/>
  <rect class="node" x="454" y="314" width="120" height="44"/>
  <rect class="node" x="454" y="378" width="120" height="44"/>
  <rect class="node" x="454" y="452" width="120" height="44"/>
  <rect class="node" x="454" y="516" width="120" height="44"/>
  <text class="body" x="486" y="205">Ant.</text>
  <text class="body" x="484" y="269">Post.</text>
  <text class="body" x="486" y="343">Ant.</text>
  <text class="body" x="484" y="407">Post.</text>
  <text class="body" x="486" y="481">Ant.</text>
  <text class="body" x="484" y="545">Post.</text>

