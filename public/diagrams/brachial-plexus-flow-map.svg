  <text class="body" x="118" y="206">C5</text>
  <text class="body" x="118" y="292">C6</text>
  <text class="body" x="118" y="378">C7</text>
  <text class="body" x="118" y="464">C8</text>
  <text class="body" x="119" y="550">T1</text>

  <rect class="node-warm" x="244" y="194" width="150" height="64"/>
  <rect class="node-warm" x="244" y="332" width="150" height="64"/>
  <rect class="node-warm" x="244" y="470" width="150" height="64"/>
